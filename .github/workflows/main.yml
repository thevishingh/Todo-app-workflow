name: Test and Build
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

             