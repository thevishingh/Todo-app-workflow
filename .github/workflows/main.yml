name: Deploy Application on AWS
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint
    Deploy:
        needs: lint-and-typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Deploy
              run: echo "Deploying application..." 
                